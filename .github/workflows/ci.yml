name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: |
          if [ -d tests ]; then
            PYTHONPATH=src ruff check src tests
          else
            echo "No tests directory found; linting src only."
            PYTHONPATH=src ruff check src
          fi

      - name: Test
        env:
          RUN_TORCH_TESTS: "1"
        run: |
          if [ -d tests ]; then
            PYTHONPATH=src pytest -q
          else
            echo "No tests directory found; skipping pytest."
          fi

      - name: Pipeline smoke command check
        run: |
          PYTHONPATH=src python -m workforce_mlops.models.train --help
          PYTHONPATH=src python -m workforce_mlops.models.compare_models --help
          PYTHONPATH=src python -m workforce_mlops.models.promote_model --help
          PYTHONPATH=src python -m workforce_mlops.models.evaluate --help
