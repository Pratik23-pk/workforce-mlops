name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Python for DVC pull
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull DVC artifacts
        run: |
          python -m pip install --upgrade pip
          pip install "dvc[s3]==3.58.0"
          dvc pull -j 1

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f docker/Dockerfile -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          echo "IMAGE_URI=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export AWS_REGION=${{ secrets.AWS_REGION }}
            IMAGE_URI=${{ env.IMAGE_URI }}
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo systemctl enable docker
              sudo systemctl start docker
            fi
            aws ecr get-login-password --region "$AWS_REGION" | sudo docker login --username AWS --password-stdin "$(echo "$IMAGE_URI" | cut -d'/' -f1)"
            sudo docker rm -f workforce-mlops-app || true
            sudo docker system prune -af || true
            sudo docker pull "$IMAGE_URI"
            sudo docker run -d --name workforce-mlops-app -p 80:8501 "$IMAGE_URI"
