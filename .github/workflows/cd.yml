name: CD (Build + GitOps)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_EXPERIMENT_NAME: ${{ secrets.MLFLOW_EXPERIMENT_NAME }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      MLFLOW_REGISTER_MODEL: ${{ secrets.MLFLOW_REGISTER_MODEL }}
      MLFLOW_REGISTERED_MODEL_NAME: ${{ secrets.MLFLOW_REGISTERED_MODEL_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-south-1

      - name: Setup Python for DVC + CT
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Normalize MLflow tracking URI
        run: |
          if [[ -z "${MLFLOW_TRACKING_URI}" ]]; then
            echo "MLFLOW_TRACKING_URI not set. Using local mlruns fallback in CI runner."
            exit 0
          fi
          if ! curl -fsS --max-time 5 "${MLFLOW_TRACKING_URI%/}/" >/dev/null; then
            echo "MLFLOW_TRACKING_URI is unreachable. Falling back to local mlruns in CI runner."
            echo "MLFLOW_TRACKING_URI=" >> "$GITHUB_ENV"
          fi

      - name: Verify AWS credentials and S3 access
        run: |
          echo "=== Verifying AWS Setup ==="
          aws sts get-caller-identity --region ap-south-1
          echo "✓ AWS credentials valid"
          
          DVC_BUCKET="${{ secrets.DVC_S3_BUCKET }}"
          if aws s3 ls "s3://${DVC_BUCKET}/" --region ap-south-1 >/dev/null 2>&1; then
            echo "✓ S3 bucket accessible: ${DVC_BUCKET}"
          else
            echo "⚠ WARNING: S3 bucket not accessible. Ensure:"
            echo "  - DVC_S3_BUCKET secret is set correctly: ${DVC_BUCKET}"
            echo "  - IAM role has S3 permissions (s3:GetObject, s3:ListBucket)"
            echo "  - Bucket exists in ap-south-1 region"
          fi

      - name: Pull DVC artifacts
        run: |
          python -m pip install --upgrade pip
          pip install "dvc[s3]>=3.58.0" boto3
          
          echo "=== Setting up DVC remote ==="
          DVC_BUCKET="${{ secrets.DVC_S3_BUCKET }}"
          dvc remote add -f origin "s3://${DVC_BUCKET}/dvc"
          dvc remote modify origin region "ap-south-1"
          dvc remote modify origin use_ssl "true"
          dvc remote list -v
          
          echo "=== Pulling DVC artifacts ==="
          if dvc pull -v -j 1; then
            echo "✓ DVC artifacts pulled successfully"
          else
            echo "⚠ DVC pull encountered issues:"
            echo "  - Check AWS_ROLE_TO_ASSUME has S3:GetObject permission"
            echo "  - Verify DVC_S3_BUCKET secret is set to: ${{ secrets.DVC_S3_BUCKET }}"
            echo "  - Ensure bucket exists and is in ap-south-1"
            echo ""
            echo "  Proceeding with local artifacts if they exist..."
            dvc status || true
          fi

      - name: Install model/runtime dependencies
        run: |
          pip install -r requirements.txt

      - name: CT auto-train + compare + promote + evaluate
        run: |
          OMP_NUM_THREADS=1 MKL_NUM_THREADS=1 PYTHONPATH=src dvc repro compare_models promote_model evaluate -v

      - name: Push refreshed DVC artifacts
        run: |
          dvc push -v -j 1

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f docker/Dockerfile -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          echo "IMAGE_REPOSITORY=$REGISTRY/$REPOSITORY" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update GitOps image tag (Argo CD source of truth)
        run: |
          OVERLAY_FILE="deploy/k8s/overlays/prod/kustomization.yaml"
          test -f "$OVERLAY_FILE"
          sed -i "s|newName: .*|newName: ${IMAGE_REPOSITORY}|" "$OVERLAY_FILE"
          sed -i "s|newTag: .*|newTag: ${IMAGE_TAG}|" "$OVERLAY_FILE"

      - name: Commit and push manifest change
        run: |
          FILES_TO_COMMIT="deploy/k8s/overlays/prod/kustomization.yaml dvc.lock"
          if git diff --quiet -- ${FILES_TO_COMMIT}; then
            echo "⚠️  No manifest/model-lock changes to commit. Check if DVC stages actually ran."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/overlays/prod/kustomization.yaml dvc.lock
          git commit -m "chore(gitops): auto-promote model + deploy image ${IMAGE_TAG}"
          git push
